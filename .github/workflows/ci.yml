name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Go services: lint + unit tests
  # ─────────────────────────────────────────────────────────────────────────────
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [order-service, payment-service, inventory-service, notification-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: services/${{ matrix.service }}
          args: --timeout=3m

  go-test:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [order-service, payment-service, inventory-service, notification-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: Run unit tests
        working-directory: services/${{ matrix.service }}
        run: go test -mod=vendor -v -count=1 -timeout 30s ./...

      - name: Upload coverage
        if: matrix.service == 'order-service'
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: services/${{ matrix.service }}/coverage.out

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend: lint + unit tests + build check
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test -- --run

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:3001

  # ─────────────────────────────────────────────────────────────────────────────
  # Terraform: validate + format check
  # ─────────────────────────────────────────────────────────────────────────────
  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - name: Terraform Format Check
        working-directory: infra/envs/dev
        run: terraform fmt -check -recursive

      - name: Terraform Init (offline)
        working-directory: infra/envs/dev
        run: terraform init -backend=false
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1

      - name: Terraform Validate
        working-directory: infra/envs/dev
        run: terraform validate
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1

  # ─────────────────────────────────────────────────────────────────────────────
  # Docker build validation
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [order-service, payment-service, inventory-service, notification-service]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: ${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Integration tests (full stack with LocalStack)
  # ─────────────────────────────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [go-test, frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Copy env
        run: cp .env.example .env

      - name: Start platform
        run: |
          docker compose up -d --build
          exit_code=$(docker wait terraform-init)
          if [ "$exit_code" != "0" ]; then
            echo "terraform-init failed with exit code $exit_code"
            docker logs terraform-init
            exit 1
          fi

      - name: Wait for services
        run: |
          for port in 3001 3002 3003 3004; do
            timeout 120 bash -c "until curl -sf http://localhost:$port/health; do sleep 2; done"
          done

      - name: Seed data
        run: bash scripts/seed.sh

      - name: Run integration tests
        working-directory: tests/integration
        run: go test -mod=vendor -v -tags=integration -timeout 120s ./...

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --no-color > docker-logs.txt

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt
